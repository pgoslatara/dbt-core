# Scenario: Snowflake Horizon (Polaris) Iceberg REST catalog attached on duckdb.
# Exercises: READ_ONLY true by default for Horizon — writes need duckdb 1.5.4 /
# duckdb-iceberg#1017 (gated to #10950), so the base attaches read-only. No
# write-compat ATTACH options are emitted (they don't exist on released duckdb).
catalogs:
  - name: horizon_demo
    type: horizon
    table_format: iceberg
    config:
      duckdb:
        warehouse: "horizon_wh"
        endpoint: "https://horizon.example.com/catalog"
        secret: "horizon_secret"
        attach_as: "horizon_db"
        default_schema: "demo"
