# Scenario: Two catalogs whose attach_as sanitizes to the same alias.
# Exercises: Configuration error emitted with the colliding alias name.
catalogs:
  - name: first_rest
    type: iceberg_rest
    table_format: iceberg
    config:
      duckdb:
        attach_as: shared
        endpoint: "https://rest-a.example.com"
  - name: second_rest
    type: iceberg_rest
    table_format: iceberg
    config:
      duckdb:
        attach_as: shared
        endpoint: "https://rest-b.example.com"
