# Scenario: Databricks Unity Catalog Iceberg REST catalog attached on duckdb.
# Exercises: read-write attach (READ_ONLY false) + Unity's write-compat default
# (DISABLE_MULTI_TABLE_COMMIT true) emitted when the user did not set it. These
# options require duckdb 1.5.4 / duckdb-iceberg#1017.
catalogs:
  - name: unity_demo
    type: unity
    table_format: iceberg
    config:
      duckdb:
        warehouse: "unity_wh"
        endpoint: "https://dbc-example.cloud.databricks.com/api/2.1/unity-catalog/iceberg"
        attach_as: "unity_db"
        default_schema: "demo"
