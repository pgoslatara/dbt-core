# Scenario: Databricks Unity Catalog Iceberg REST catalog attached on duckdb.
# Exercises: READ_ONLY true by default for Unity — writes need duckdb 1.5.4 /
# duckdb-iceberg#1017 (gated to #10950), so the base attaches read-only. No
# write-compat ATTACH options are emitted (they don't exist on released duckdb).
catalogs:
  - name: unity_demo
    type: unity
    table_format: iceberg
    config:
      duckdb:
        warehouse: "unity_wh"
        endpoint: "https://dbc-example.cloud.databricks.com/api/2.1/unity-catalog/iceberg"
        attach_as: "unity_db"
        default_schema: "demo"
