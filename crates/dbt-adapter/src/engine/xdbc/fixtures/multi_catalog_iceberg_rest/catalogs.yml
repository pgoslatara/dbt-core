# Scenario: Two catalogs of the same type, no DuckLake.
# Exercises: emission order preserved; NO `INSTALL ducklake` prelude.
catalogs:
  - name: rest_a
    type: iceberg_rest
    table_format: iceberg
    config:
      duckdb:
        endpoint: "https://rest-a.example.com"
        attach_as: rest_a
  - name: rest_demo
    type: iceberg_rest
    table_format: iceberg
    config:
      duckdb:
        warehouse: "demo_warehouse"
        attach_as: "rest_demo"
