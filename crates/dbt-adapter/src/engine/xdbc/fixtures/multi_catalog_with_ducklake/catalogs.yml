# Scenario: Mixed catalog types including two DuckLake entries.
# Exercises: `INSTALL ducklake` prepended exactly once even with multiple
# DuckLake catalogs; ordering of ATTACHes preserved.
catalogs:
  - name: rest_demo
    type: iceberg_rest
    table_format: iceberg
    config:
      duckdb:
        warehouse: "demo_warehouse"
        attach_as: "rest_demo"
  - name: lake_a
    type: ducklake
    table_format: default
    config:
      duckdb:
        metadata_path: "lake_a.db"
        attach_as: lake_a
  - name: lake_b
    type: ducklake
    table_format: default
    config:
      duckdb:
        metadata_path: "lake_b.db"
        attach_as: lake_b
